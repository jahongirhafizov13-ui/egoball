<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Haxclone</title>
<style>
  :root{
    --bg1:#0d1b2a; --bg2:#1b263b; --panel:#1b263b; --panel2:#243447;
    --accent:#4fb0ff; --accent2:#ff6b6b; --gold:#e0b13c; --txt:#eaf0f6; --txt-dim:#8a97a8;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;width:100%;height:100%;background:var(--bg1);overflow:hidden;
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;color:var(--txt);}
  #app{position:fixed;inset:0;width:100%;height:100%;}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
    background:radial-gradient(ellipse at 50% -10%, var(--bg2) 0%, var(--bg1) 70%);padding:20px;
    box-sizing:border-box;overflow-y:auto;}
  .screen.hidden{display:none;}
  .card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:16px;
    padding:28px;width:min(92vw,380px);box-shadow:0 12px 40px rgba(0,0,0,.4);}
  h1{font-size:32px;margin:0 0 4px;letter-spacing:2px;font-weight:800;
    background:linear-gradient(135deg,var(--accent),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .tagline{color:var(--txt-dim);font-size:12px;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}
  input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:8px;
    color:var(--txt);padding:11px 14px;font-size:15px;margin-bottom:10px;}
  input:focus{outline:none;border-color:var(--accent);}
  .btn{display:block;width:100%;text-align:center;background:linear-gradient(135deg,var(--accent),#2d8fe0);
    border:none;border-radius:8px;color:#fff;font-weight:700;font-size:15px;padding:12px;cursor:pointer;margin-top:6px;}
  .btn:hover{filter:brightness(1.08);}
  .btn.secondary{background:rgba(255,255,255,.08);}
  .btn.small{padding:9px;font-size:13px;}
  .btn.danger{background:linear-gradient(135deg,var(--accent2),#c94848);}
  .link{color:var(--accent);text-align:center;font-size:13px;cursor:pointer;margin-top:12px;}
  .error-msg{color:var(--accent2);font-size:13px;text-align:center;margin-top:6px;min-height:16px;}
  .row{display:flex;gap:8px;}
  .row > *{flex:1;}
  .teamsize-picker{display:flex;gap:6px;margin-bottom:14px;}
  .teamsize-picker div{flex:1;text-align:center;padding:8px;border-radius:8px;background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.1);cursor:pointer;font-weight:700;}
  .teamsize-picker div.active{background:var(--accent);border-color:var(--accent);}
  .room-list-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;
    background:rgba(255,255,255,.04);border-radius:8px;margin-bottom:6px;font-size:13px;}
  .room-code-display{font-size:38px;font-weight:800;letter-spacing:6px;text-align:center;color:var(--gold);margin:8px 0;}
  .member-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;margin-bottom:6px;}
  .member-row.red{background:rgba(255,107,107,.12);border-left:3px solid var(--accent2);}
  .member-row.blue{background:rgba(79,176,255,.12);border-left:3px solid var(--accent);}
  #hud{position:absolute;top:0;left:0;right:0;z-index:5;display:flex;justify-content:center;pointer-events:none;}
  #scoreBoard{margin-top:14px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.1);border-radius:10px;
    padding:8px 22px;display:flex;align-items:center;gap:14px;font-size:20px;font-weight:800;}
  #scoreBoard .red{color:var(--accent2);} #scoreBoard .blue{color:var(--accent);}
  #timer{font-size:14px;color:var(--txt-dim);font-weight:600;}
  #leaveMatchBtn{position:absolute;top:14px;right:14px;z-index:6;pointer-events:auto;}
  #goalFlash{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;
    font-size:64px;font-weight:900;letter-spacing:4px;opacity:0;text-shadow:0 4px 20px rgba(0,0,0,.6);z-index:7;}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
  .mobile-controls{position:absolute;inset:0;z-index:8;pointer-events:none;display:none;}
  .mobile-controls.active{display:block;}
  .joy-zone{position:absolute;left:0;bottom:0;width:50%;height:60%;pointer-events:auto;touch-action:none;}
  .joy-base{position:absolute;width:110px;height:110px;border-radius:50%;display:none;
    background:radial-gradient(circle,rgba(255,255,255,.14),rgba(255,255,255,.04));border:2px solid rgba(224,177,60,.5);}
  .joy-stick{position:absolute;width:46px;height:46px;border-radius:50%;left:32px;top:32px;
    background:rgba(224,177,60,.85);}
  #kickBtn{position:absolute;right:36px;bottom:60px;width:84px;height:84px;border-radius:50%;pointer-events:auto;
    background:linear-gradient(160deg,#ff8a8a,var(--accent2));display:flex;align-items:center;justify-content:center;
    font-weight:800;color:#3a0507;font-size:14px;box-shadow:0 6px 16px rgba(0,0,0,.4);user-select:none;}
</style>
</head>
<body>
<div id="app">

  <!-- LOGIN -->
  <div class="screen" id="screen-login">
    <h1>HAXCLONE</h1>
    <div class="tagline">Server-authoritative multiplayer soccer</div>
    <div class="card">
      <input id="loginUsername" placeholder="Username" autocomplete="username">
      <input id="loginPassword" type="password" placeholder="Password" autocomplete="current-password">
      <div class="btn" id="btnLogin">Log In</div>
      <div class="btn secondary" id="btnRegister">Create Account</div>
      <div class="error-msg" id="loginError"></div>
    </div>
  </div>

  <!-- LOBBY -->
  <div class="screen hidden" id="screen-lobby">
    <div class="card">
      <h1 style="font-size:22px;">Lobby</h1>
      <div style="color:var(--txt-dim);font-size:13px;margin-bottom:14px;" id="lobbyGreeting"></div>

      <div style="font-size:12px;color:var(--txt-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">New room - team size</div>
      <div class="teamsize-picker" id="teamSizePicker">
        <div data-size="1">1v1</div><div data-size="2" class="active">2v2</div><div data-size="3">3v3</div><div data-size="4">4v4</div>
      </div>
      <div class="btn" id="btnCreateRoom">Create Room</div>

      <div class="row" style="margin-top:16px;">
        <input id="joinCodeInput" placeholder="ROOM CODE" style="text-transform:uppercase;">
        <div class="btn small" id="btnJoinRoom" style="width:auto;flex:0 0 90px;">Join</div>
      </div>

      <div style="margin-top:18px;display:flex;justify-content:space-between;align-items:center;">
        <div style="font-size:12px;color:var(--txt-dim);text-transform:uppercase;letter-spacing:1px;">Open Rooms</div>
        <div class="link" id="btnRefreshRooms" style="margin:0;">Refresh</div>
      </div>
      <div id="roomListBox" style="margin-top:8px;max-height:160px;overflow-y:auto;"></div>

      <div class="link" id="btnLogout">Log out</div>
      <div class="error-msg" id="lobbyError"></div>
    </div>
  </div>

  <!-- ROOM WAITING -->
  <div class="screen hidden" id="screen-room">
    <div class="card">
      <div style="text-align:center;color:var(--txt-dim);font-size:12px;text-transform:uppercase;letter-spacing:1px;">Room Code</div>
      <div class="room-code-display" id="roomCodeDisplay">-----</div>
      <div id="roomMembersBox" style="margin:14px 0;"></div>
      <div class="btn" id="btnStartMatch">Start Match</div>
      <div class="btn secondary" id="btnLeaveRoom">Leave Room</div>
    </div>
  </div>

  <!-- MATCH -->
  <div class="screen hidden" id="screen-match" style="padding:0;background:#0a2e22;">
    <canvas id="gameCanvas"></canvas>
    <div id="hud">
      <div id="scoreBoard"><span class="red" id="scoreRed">0</span><span id="timer">5:00</span><span class="blue" id="scoreBlue">0</span></div>
    </div>
    <div id="goalFlash">GOAL!</div>
    <div class="btn danger small" id="leaveMatchBtn">Exit</div>
    <div class="mobile-controls" id="mobileControls">
      <div class="joy-zone" id="joyZone"><div class="joy-base" id="joyBase"><div class="joy-stick" id="joyStick"></div></div></div>
      <div id="kickBtn">KICK</div>
    </div>
  </div>

  <!-- POST MATCH -->
  <div class="screen hidden" id="screen-postmatch">
    <div class="card" style="text-align:center;">
      <h1 style="font-size:24px;" id="postMatchTitle">Match Over</h1>
      <div id="postMatchScore" style="font-size:40px;font-weight:800;margin:14px 0;"></div>
      <div class="btn" id="btnBackToLobby">Back to Lobby</div>
    </div>
  </div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
/* ============================= CONNECTION ============================= */
const socket = io(); // same-origin - client is served by the same process as the API
let myToken = localStorage.getItem('haxclone_token') || null;
let myUsername = null;
let currentRoomCode = null;
let myTeam = null;

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

/* ============================= AUTH ============================= */
document.getElementById('btnLogin').addEventListener('click', ()=>{
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  socket.emit('login', {username, password}, (res)=>{
    if(!res.ok){ showLoginError(res.error); return; }
    onAuthed(res.token, res.profile);
  });
});
document.getElementById('btnRegister').addEventListener('click', ()=>{
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  socket.emit('register', {username, password}, (res)=>{
    if(!res.ok){ showLoginError(res.error); return; }
    onAuthed(res.token, res.profile);
  });
});
function showLoginError(code){
  const map = {
    bad_username:'Username must be 3-16 letters/numbers.',
    bad_password:'Password must be at least 4 characters.',
    username_taken:'That username is already taken.',
    no_such_user:'No account with that username.',
    wrong_password:'Wrong password.',
    too_fast:'Slow down a little and try again.'
  };
  document.getElementById('loginError').textContent = map[code] || 'Something went wrong.';
}
function onAuthed(token, profile){
  myToken = token; myUsername = profile.username;
  localStorage.setItem('haxclone_token', token);
  document.getElementById('lobbyGreeting').textContent = `Signed in as ${profile.username} - ${profile.wins||0} wins`;
  refreshRoomList();
  show('screen-lobby');
}
// try silent auto-login with a saved token
if(myToken){
  socket.emit('authenticate', {token:myToken}, (res)=>{
    if(res.ok) onAuthed(myToken, res.profile);
  });
}
document.getElementById('btnLogout').addEventListener('click', ()=>{
  localStorage.removeItem('haxclone_token'); myToken=null; myUsername=null;
  show('screen-login');
});

/* ============================= LOBBY / ROOMS ============================= */
let selectedTeamSize = 2;
document.querySelectorAll('#teamSizePicker div').forEach(el=>{
  el.addEventListener('click', ()=>{
    document.querySelectorAll('#teamSizePicker div').forEach(e=>e.classList.remove('active'));
    el.classList.add('active');
    selectedTeamSize = +el.getAttribute('data-size');
  });
});
document.getElementById('btnCreateRoom').addEventListener('click', ()=>{
  socket.emit('createRoom', {teamSize:selectedTeamSize}, (res)=>{
    if(!res.ok){ document.getElementById('lobbyError').textContent = 'Could not create room.'; return; }
    currentRoomCode = res.code;
    show('screen-room');
  });
});
document.getElementById('btnJoinRoom').addEventListener('click', ()=>{
  const code = document.getElementById('joinCodeInput').value.trim().toUpperCase();
  if(!code) return;
  joinRoomByCode(code);
});
function joinRoomByCode(code){
  socket.emit('joinRoom', {code}, (res)=>{
    if(!res.ok){ document.getElementById('lobbyError').textContent = 'Could not join that room.'; return; }
    currentRoomCode = res.code; myTeam = res.team;
    show('screen-room');
  });
}
document.getElementById('btnRefreshRooms').addEventListener('click', refreshRoomList);
function refreshRoomList(){
  socket.emit('listRooms', (res)=>{
    if(!res.ok) return;
    const box = document.getElementById('roomListBox');
    if(res.rooms.length===0){ box.innerHTML = '<div style="color:var(--txt-dim);font-size:12px;text-align:center;padding:10px;">No open rooms right now.</div>'; return; }
    box.innerHTML = res.rooms.map(r=>`
      <div class="room-list-item">
        <span><b>${r.code}</b> · ${r.teamSize}v${r.teamSize} · ${r.players}/${r.teamSize*2} ${r.started?'(in progress)':''}</span>
        <span class="link" style="margin:0;" data-join="${r.code}">Join</span>
      </div>`).join('');
    box.querySelectorAll('[data-join]').forEach(el=>{
      el.addEventListener('click', ()=> joinRoomByCode(el.getAttribute('data-join')));
    });
  });
}

/* ============================= ROOM WAITING ============================= */
socket.on('roomUpdate', (data)=>{
  if(data.code !== currentRoomCode) return;
  document.getElementById('roomCodeDisplay').textContent = data.code;
  const box = document.getElementById('roomMembersBox');
  box.innerHTML = data.members.map(m=>`<div class="member-row ${m.team}">${m.username}${m.username===myUsername?' (you)':''} - ${m.team}</div>`).join('');
});
document.getElementById('btnStartMatch').addEventListener('click', ()=>{
  socket.emit('startMatch', (res)=>{});
});
document.getElementById('btnLeaveRoom').addEventListener('click', ()=>{
  socket.emit('leaveRoom', ()=>{ currentRoomCode=null; show('screen-lobby'); refreshRoomList(); });
});

/* ============================= MATCH ============================= */
let stadium = null;
let latestState = null;
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
function resizeCanvas(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resizeCanvas); resizeCanvas();

socket.on('matchStarted', (data)=>{
  stadium = data.stadium;
  show('screen-match');
  document.getElementById('mobileControls').classList.toggle('active', isTouchDevice());
});
socket.on('state', (st)=>{
  latestState = st;
  stadium = st.stadium;
  document.getElementById('scoreRed').textContent = st.score.red;
  document.getElementById('scoreBlue').textContent = st.score.blue;
  const secs = Math.ceil(st.timeLeftMs/1000);
  document.getElementById('timer').textContent = Math.floor(secs/60)+':'+String(secs%60).padStart(2,'0');
  render();
});
socket.on('goal', (info)=>{
  const flash = document.getElementById('goalFlash');
  flash.style.color = info.scoringTeam==='red' ? 'var(--accent2)' : 'var(--accent)';
  flash.style.opacity = '1';
  setTimeout(()=> flash.style.opacity='0', 1400);
});
socket.on('matchEnded', (info)=>{
  const winner = info.score.red===info.score.blue ? 'Draw' : (info.score.red>info.score.blue?'Red Team Wins':'Blue Team Wins');
  document.getElementById('postMatchTitle').textContent = winner;
  document.getElementById('postMatchScore').innerHTML = `<span style="color:var(--accent2)">${info.score.red}</span> - <span style="color:var(--accent)">${info.score.blue}</span>`;
  show('screen-postmatch');
});
document.getElementById('btnBackToLobby').addEventListener('click', ()=>{
  show('screen-lobby'); refreshRoomList();
});
document.getElementById('leaveMatchBtn').addEventListener('click', ()=>{
  socket.emit('leaveRoom', ()=>{ currentRoomCode=null; show('screen-lobby'); refreshRoomList(); });
});

function render(){
  if(!latestState || !stadium) return;
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = '#0a2e22'; ctx.fillRect(0,0,w,h);

  const zoom = Math.min(w/(stadium.width+120), h/(stadium.height+120));
  ctx.save();
  ctx.translate(w/2, h/2);
  ctx.scale(zoom, zoom);

  // pitch
  ctx.fillStyle = '#0d3d2e';
  ctx.fillRect(-stadium.width/2, -stadium.height/2, stadium.width, stadium.height);
  ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 3;
  ctx.strokeRect(-stadium.width/2, -stadium.height/2, stadium.width, stadium.height);
  ctx.beginPath(); ctx.moveTo(0,-stadium.height/2); ctx.lineTo(0,stadium.height/2); ctx.stroke();
  ctx.beginPath(); ctx.arc(0,0,60,0,Math.PI*2); ctx.stroke();

  // goals
  ['left','right'].forEach(side=>{
    const x = side==='left' ? -stadium.width/2 : stadium.width/2;
    const dir = side==='left' ? -1 : 1;
    ctx.strokeStyle = '#e0b13c'; ctx.lineWidth=4;
    ctx.strokeRect(x, -stadium.goalWidth/2, dir*stadium.goalDepth, stadium.goalWidth);
  });

  // ball
  const b = latestState.ball;
  ctx.beginPath(); ctx.arc(b.x,b.y,10,0,Math.PI*2);
  ctx.fillStyle = '#f5f5f0'; ctx.fill(); ctx.lineWidth=2; ctx.strokeStyle='#0b0d10'; ctx.stroke();

  // players
  latestState.players.forEach(p=>{
    ctx.beginPath(); ctx.arc(p.x,p.y,15,0,Math.PI*2);
    ctx.fillStyle = p.team==='red' ? '#ff6b6b' : '#4fb0ff';
    ctx.fill(); ctx.lineWidth=2.5; ctx.strokeStyle='#0a0a0a'; ctx.stroke();
  });

  ctx.restore();
}

/* ============================= INPUT ============================= */
const keyState = { up:false, down:false, left:false, right:false, kick:false };
window.addEventListener('keydown', e=>{
  if(['w','arrowup'].includes(e.key.toLowerCase())) keyState.up=true;
  if(['s','arrowdown'].includes(e.key.toLowerCase())) keyState.down=true;
  if(['a','arrowleft'].includes(e.key.toLowerCase())) keyState.left=true;
  if(['d','arrowright'].includes(e.key.toLowerCase())) keyState.right=true;
  if(e.key===' ') keyState.kick=true;
});
window.addEventListener('keyup', e=>{
  if(['w','arrowup'].includes(e.key.toLowerCase())) keyState.up=false;
  if(['s','arrowdown'].includes(e.key.toLowerCase())) keyState.down=false;
  if(['a','arrowleft'].includes(e.key.toLowerCase())) keyState.left=false;
  if(['d','arrowright'].includes(e.key.toLowerCase())) keyState.right=false;
  if(e.key===' ') keyState.kick=false;
});

function isTouchDevice(){ return 'ontouchstart' in window || navigator.maxTouchPoints>0; }

// joystick -> up/down/left/right booleans (thresholded), sent the same way keyboard is
(function setupJoystick(){
  const zone = document.getElementById('joyZone');
  const base = document.getElementById('joyBase');
  const stick = document.getElementById('joyStick');
  let active=false, originX=0, originY=0, pointerId=null;
  function showBase(x,y){ base.style.display='block'; base.style.left=(x-55)+'px'; base.style.top=(y-55)+'px'; originX=x; originY=y; }
  function hideBase(){ base.style.display='none'; stick.style.transform='translate(0,0)'; keyState.up=keyState.down=keyState.left=keyState.right=false; }
  zone.addEventListener('pointerdown', e=>{
    active=true; pointerId=e.pointerId; showBase(e.clientX,e.clientY);
    try{ zone.setPointerCapture(e.pointerId); }catch(err){}
  });
  zone.addEventListener('pointermove', e=>{
    if(!active || e.pointerId!==pointerId) return;
    const dx=e.clientX-originX, dy=e.clientY-originY;
    const dist=Math.min(40,Math.hypot(dx,dy)); const ang=Math.atan2(dy,dx);
    stick.style.transform = `translate(${Math.cos(ang)*dist}px, ${Math.sin(ang)*dist}px)`;
    const dead=10;
    keyState.left = dx<-dead; keyState.right = dx>dead;
    keyState.up = dy<-dead; keyState.down = dy>dead;
  });
  function release(e){ if(e.pointerId!==pointerId) return; active=false; pointerId=null; hideBase(); }
  zone.addEventListener('pointerup', release);
  zone.addEventListener('pointercancel', release);
})();
const kickBtn = document.getElementById('kickBtn');
kickBtn.addEventListener('pointerdown', ()=> keyState.kick=true);
kickBtn.addEventListener('pointerup', ()=> keyState.kick=false);
kickBtn.addEventListener('pointercancel', ()=> keyState.kick=false);

// send input at a fixed rate - independent of render/keypress event rate
setInterval(()=>{
  if(document.getElementById('screen-match').classList.contains('hidden')) return;
  socket.emit('input', keyState);
}, 1000/30);
</script>
</body>
</html>
